<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promo Codes — Les Roches Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;background:#0f0d0b;color:#e8e2d9;min-height:100vh;padding:2rem}
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Gilda+Display&display=swap');
  h1{font-family:'Gilda Display',serif;font-size:1.8rem;font-weight:400;margin-bottom:.3rem;color:#fff}
  .sub{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2rem}
  #auth-screen{max-width:380px;margin:6rem auto;text-align:center}
  #auth-screen h2{font-family:'Gilda Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:1.5rem;color:#fff}
  .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;text-align:left}
  .field label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  input[type=password],input[type=text],input[type=number],input[type=date]{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:.65rem .9rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
  input:focus{border-color:rgba(255,255,255,.4)}
  .btn{background:#2a2520;border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:.65rem 1.5rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .2s}
  .btn:hover{background:#3a3028}
  .btn-danger{border-color:rgba(248,113,113,.4);color:#f87171}
  .btn-danger:hover{background:rgba(248,113,113,.1)}
  .btn-sm{padding:.42rem 1rem;font-size:.6rem}
  #auth-err{color:#f87171;font-size:.75rem;margin-top:.8rem;min-height:1.1rem}
  #admin-panel{display:none;max-width:900px;margin:0 auto}
  .panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:1.5rem;margin-bottom:1.5rem}
  .panel-title{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:1.2rem}
  .form-grid{display:grid;grid-template-columns:1fr 80px 100px 140px auto;gap:.75rem;align-end:end}
  table{width:100%;border-collapse:collapse}
  th{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:left;padding:.6rem .8rem;border-bottom:1px solid rgba(255,255,255,.1)}
  td{padding:.75rem .8rem;border-bottom:1px solid rgba(255,255,255,.06);font-size:.8rem}
  .badge{display:inline-block;padding:.22rem .65rem;border-radius:20px;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase}
  .badge.on{background:rgba(125,211,168,.15);color:#7dd3a8;border:1px solid rgba(125,211,168,.3)}
  .badge.off{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.12)}
  .actions{display:flex;gap:.5rem}
  .msg{font-size:.72rem;margin-top:.6rem;min-height:1rem}
  .msg.ok{color:#7dd3a8}.msg.err{color:#f87171}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
  .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:1rem 1.2rem}
  .stat-val{font-family:'Gilda Display',serif;font-size:1.6rem;color:#fff}
  .stat-lbl{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:.25rem}
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <h2>Les Roches — Admin</h2>
  <div class="field"><label>Admin Password</label>
    <input type="password" id="admin-pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
  </div>
  <button class="btn" onclick="checkPw()">Enter</button>
  <div id="auth-err"></div>
</div>

<!-- Admin panel -->
<div id="admin-panel">
  <h1>Promo Codes</h1>
  <div class="sub">Les Roches Admin Panel</div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total codes</div></div>
    <div class="stat"><div class="stat-val" id="stat-active">—</div><div class="stat-lbl">Active codes</div></div>
    <div class="stat"><div class="stat-val" id="stat-uses">—</div><div class="stat-lbl">Total uses</div></div>
  </div>

  <!-- Create -->
  <div class="panel">
    <div class="panel-title">Create New Code</div>
    <div class="form-grid">
      <div class="field" style="margin:0"><label>Code</label><input type="text" id="new-code" placeholder="SUMMER20" style="text-transform:uppercase"></div>
      <div class="field" style="margin:0"><label>Discount %</label><input type="number" id="new-pct" min="1" max="100" placeholder="10"></div>
      <div class="field" style="margin:0"><label>Max uses</label><input type="number" id="new-max" min="1" placeholder="Unlimited"></div>
      <div class="field" style="margin:0"><label>Expires</label><input type="date" id="new-exp"></div>
      <div class="field" style="margin:0"><label>&nbsp;</label><button class="btn" onclick="createCode()" style="width:100%">Create</button></div>
    </div>
    <div class="msg" id="create-msg"></div>
  </div>

  <!-- List -->
  <div class="panel">
    <div class="panel-title">All Promo Codes <button class="btn btn-sm" onclick="loadCodes()" style="margin-left:.8rem">Refresh</button></div>
    <table>
      <thead><tr><th>Code</th><th>Discount</th><th>Uses</th><th>Max Uses</th><th>Expires</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="codes-tbody"><tr><td colspan="7" style="color:rgba(255,255,255,.3);text-align:center;padding:2rem">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const SB = 'https://vrufclzcaswkdgrffdwm.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydWZjbHpjYXN3a2RncmZmZHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTE2MjgsImV4cCI6MjA4OTg2NzYyOH0.cHllj6HZms7qf5PVc3LPy057r3rvCv6JyjfAfVlH34E';
const PW_HASH = '1e9948eabf49a49b9bc731ebe141ac5844999ad6e6f9c9ea5fc4395332d455cf';

async function checkPw() {
  const pw = document.getElementById('admin-pw').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hex === PW_HASH) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadCodes();
  } else {
    document.getElementById('auth-err').textContent = 'Incorrect password.';
  }
}

async function sbFetch(path, opts) {
  const h = { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json', Prefer: 'return=representation', ...((opts||{}).headers||{}) };
  return fetch(SB + '/rest/v1/' + path, { ...opts, headers: h }).then(r => r.json());
}

async function loadCodes() {
  const data = await sbFetch('promo_codes?select=*&order=created_at.desc');
  const tbody = document.getElementById('codes-tbody');
  if (!data || !data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:rgba(255,255,255,.3);text-align:center;padding:2rem">No codes yet.</td></tr>';
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-active').textContent = '0';
    document.getElementById('stat-uses').textContent = '0';
    return;
  }
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-active').textContent = data.filter(c => c.active).length;
  document.getElementById('stat-uses').textContent = data.reduce((s,c) => s + (c.uses_count||0), 0);
  tbody.innerHTML = data.map(c => `<tr>
    <td style="font-weight:600;letter-spacing:.08em">${c.code}</td>
    <td>${c.discount_pct}%</td>
    <td>${c.uses_count || 0}</td>
    <td>${c.max_uses || '∞'}</td>
    <td>${c.expires_at ? c.expires_at.substring(0,10) : '—'}</td>
    <td><span class="badge ${c.active ? 'on' : 'off'}">${c.active ? 'Active' : 'Paused'}</span></td>
    <td><div class="actions">
      <button class="btn btn-sm" onclick="toggleCode('${c.code}',${!c.active})">${c.active ? 'Pause' : 'Activate'}</button>
      <button class="btn btn-sm btn-danger" onclick="deleteCode('${c.code}')">Delete</button>
    </div></td>
  </tr>`).join('');
}

async function createCode() {
  const code = (document.getElementById('new-code').value||'').trim().toUpperCase();
  const pct = parseInt(document.getElementById('new-pct').value, 10);
  const max = document.getElementById('new-max').value ? parseInt(document.getElementById('new-max').value, 10) : null;
  const exp = document.getElementById('new-exp').value || null;
  const msg = document.getElementById('create-msg');
  if (!code || isNaN(pct) || pct < 1 || pct > 100) { msg.className='msg err'; msg.textContent='Code and valid % required.'; return; }
  const body = { code, discount_pct: pct, active: true };
  if (max) body.max_uses = max;
  if (exp) body.expires_at = exp;
  const res = await sbFetch('promo_codes', { method: 'POST', body: JSON.stringify(body) });
  if (Array.isArray(res) && res.length > 0) {
    msg.className='msg ok'; msg.textContent='Code "' + code + '" created!';
    document.getElementById('new-code').value='';
    document.getElementById('new-pct').value='';
    document.getElementById('new-max').value='';
    document.getElementById('new-exp').value='';
    loadCodes();
  } else {
    msg.className='msg err'; msg.textContent='Error: ' + JSON.stringify(res).substring(0,80);
  }
}

async function toggleCode(code, active) {
  await sbFetch('promo_codes?code=eq.' + encodeURIComponent(code), { method: 'PATCH', body: JSON.stringify({ active }) });
  loadCodes();
}

async function deleteCode(code) {
  if (!confirm('Delete promo code "' + code + '"?')) return;
  await sbFetch('promo_codes?code=eq.' + encodeURIComponent(code), { method: 'DELETE' });
  loadCodes();
}
</script>
</body>
</html>

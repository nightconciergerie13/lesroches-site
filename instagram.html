<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Roches Retreat</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ter:  #b8734a;
    --ter2: #a05f38;
    --ink:  #1e1b18;
    --w:    #faf7f2;
    --mid:  #9a8f82;
  }

  html, body {
    height: 100%;
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    background: var(--ink);
    color: var(--w);
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg {
    position: fixed;
    inset: 0;
    background-image: url('images/drone-sunset-dusk.webp');
    background-size: cover;
    background-position: center 60%;
    z-index: 0;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(18,14,10,.55) 0%,
      rgba(18,14,10,.45) 40%,
      rgba(18,14,10,.72) 75%,
      rgba(18,14,10,.92) 100%
    );
  }

  /* ── Content ── */
  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 4rem;
    gap: 0;
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.8rem;
    animation: fadeUp .8s ease both;
  }
  .logo-eye {
    font-family: 'Outfit', sans-serif;
    font-size: .42rem;
    letter-spacing: .5em;
    text-transform: uppercase;
    color: var(--ter);
    margin-bottom: .9rem;
  }
  .logo {
    font-family: 'Gilda Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: .04em;
    color: var(--w);
    line-height: 1;
  }
  .logo-sub {
    font-family: 'Outfit', sans-serif;
    font-size: .5rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: rgba(250,247,242,.45);
    margin-top: .75rem;
  }

  /* ── Divider ── */
  .divider {
    width: 32px;
    height: 1px;
    background: var(--ter);
    margin: 0 auto 2.8rem;
    opacity: .7;
    animation: fadeUp .8s .1s ease both;
  }

  /* ── Buttons ── */
  .links {
    display: flex;
    flex-direction: column;
    gap: .9rem;
    width: 100%;
    max-width: 340px;
    animation: fadeUp .8s .2s ease both;
  }

  .lnk {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .75rem;
    padding: 1rem 1.4rem;
    border-radius: 3px;
    font-family: 'Outfit', sans-serif;
    font-size: .62rem;
    font-weight: 300;
    letter-spacing: .22em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform .22s ease, background .22s ease, border-color .22s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .lnk:active { transform: scale(.97); }

  /* Primary */
  .lnk-primary {
    background: var(--ter);
    color: var(--w);
    border: 1px solid var(--ter);
  }
  .lnk-primary:hover { background: var(--ter2); border-color: var(--ter2); }

  /* Secondary */
  .lnk-secondary {
    background: rgba(250,247,242,.07);
    color: var(--w);
    border: 1px solid rgba(250,247,242,.2);
    backdrop-filter: blur(6px);
  }
  .lnk-secondary:hover {
    background: rgba(250,247,242,.13);
    border-color: rgba(250,247,242,.4);
  }

  /* WhatsApp */
  .lnk-whatsapp {
    background: rgba(37,211,102,.12);
    color: #e6fdf0;
    border: 1px solid rgba(37,211,102,.3);
    backdrop-filter: blur(6px);
  }
  .lnk-whatsapp:hover {
    background: rgba(37,211,102,.2);
    border-color: rgba(37,211,102,.5);
  }

  .lnk svg { flex-shrink: 0; opacity: .85; }

  /* ── Footer ── */
  .footer {
    margin-top: 3rem;
    font-size: .42rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: rgba(250,247,242,.2);
    animation: fadeUp .8s .4s ease both;
  }

  /* ── Animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div class="bg"></div>

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
      Full website
    </a>

  </div>

  <div class="footer">lesrochesretreat.com</div>

</div>

</body>
</html>
